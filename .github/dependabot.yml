# Dependabot — weekly dependency update PRs.
# Pairs with GitHub's "Dependabot alerts" (enable in repo Settings → Code security),
# which flags vulnerable deps like the next@14.2.x CVE we patched on 2026-06-12.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Group minor/patch into a single PR to cut noise.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major framework upgrades (Next, React, Tailwind, ESLint, …) carry breaking
      # changes and are done as planned, tested migrations — not auto-PRs. Security
      # updates still come through regardless of this rule.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
